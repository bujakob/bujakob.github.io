<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jakob burger // Wrapped</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    
    <link href="https://fonts.googleapis.com/css2?family=Funnel+Display:wght@300..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    
    <style>
        :root {
            --bg-color: #f0f0f0;
            --card-bg: #ffffff;
            --text-color: #121212;
            --accent-color: #1DB954;
            --switch-bg: #ffffff;
            --handle-light: #A0B3F2;
            --handle-dark: #000000;
            --card-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #ffffff;
            --accent-color: #1ed760;
            --switch-bg: #ffffff; /* Label bleibt weiß für Kontrast zum BG */
            --card-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.3s ease, color 0.3s ease, transform 0.3s ease;
        }

        body {
            font-family: 'Funnel Display', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 2rem;
            overflow-x: hidden;
        }

        header {
            max-width: 1400px;
            margin: 0 auto 3rem auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .main-title {
            font-size: clamp(3rem, 8vw, 6rem);
            font-weight: 800;
            text-transform: uppercase;
            line-height: 0.85;
            letter-spacing: -2px;
        }

        /* --- Modern Material Switch --- */
        .switch-wrapper {
            position: relative;
            width: 260px;
            height: 64px;
            background: #ffffff;
            border-radius: 100px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            cursor: pointer;
            display: flex;
            align-items: center;
            padding: 0 8px;
        }

        .switch-checkbox { display: none; }

        .switch-label {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            position: relative;
            z-index: 1;
            cursor: pointer;
        }

        .switch-text {
            font-weight: 800;
            font-size: 0.8rem;
            color: #000;
            letter-spacing: 1px;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .handle {
            position: absolute;
            height: 52px;
            width: 52px;
            background-color: var(--handle-light);
            border-radius: 50%;
            top: 6px;
            left: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55), background-color 0.3s;
            z-index: 2;
        }

        .handle .material-symbols-outlined {
            color: white;
            font-size: 28px;
        }

        /* Switch Logic */
        .switch-checkbox:checked + .switch-wrapper .handle {
            transform: translateX(196px);
            background-color: var(--handle-dark);
        }

        .switch-checkbox:checked + .switch-wrapper .text-light { opacity: 0.2; }
        .switch-checkbox:not(:checked) + .switch-wrapper .text-dark { opacity: 0.2; }

        /* --- Layout --- */
        .container { max-width: 1400px; margin: 0 auto; }

        .master-header {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            margin-bottom: 3rem;
            border-bottom: 6px solid var(--accent-color);
            display: inline-block;
        }

        .row-group {
            display: flex;
            gap: 2rem;
            margin-bottom: 4rem;
            align-items: stretch; /* Macht alle Spalten in der Reihe gleich hoch */
        }

        .sub-section { flex: 1; display: flex; flex-direction: column; }

        .section-title {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 1.5rem;
            color: var(--accent-color);
            font-weight: 800;
        }

        .card-grid {
            display: grid;
            gap: 1rem;
            height: 100%;
        }

        /* Quote Spalten: 2/5 und 3/5 Platzierung */
        .flex-2 { flex: 2; }
        .flex-3 { flex: 3; }
        .flex-1 { flex: 1; }
        .flex-6 { flex: 6; }

        .grid-2 { grid-template-columns: repeat(2, 1fr); }
        .grid-3 { grid-template-columns: repeat(3, 1fr); }
        .grid-1 { grid-template-columns: 1fr; }
        .grid-6 { grid-template-columns: repeat(6, 1fr); }

        /* --- Cards --- */
        .card {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 1.5rem;
            min-height: 280px; /* Einheitliche Mindesthöhe */
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            text-decoration: none;
            color: inherit;
            box-shadow: var(--card-shadow);
            border: 1px solid rgba(128,128,128,0.1);
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: scale(1.02) rotate(-1deg);
            background-color: var(--accent-color);
            color: #000;
        }

        .card-lehrer { border-bottom: 8px solid #ff4d00; }
        .card-schueler { border-bottom: 8px solid #9d00ff; }
        .card-4years { border-bottom: 8px solid #00d4ff; }
        .card-reisen { border-bottom: 8px solid var(--accent-color); }

        /* --- Responsive --- */
        @media (max-width: 1100px) {
            .row-group { flex-direction: column; }
            .grid-6 { grid-template-columns: repeat(3, 1fr); }
        }

        @media (max-width: 768px) {
            header { justify-content: center; text-align: center; }
            .grid-2, .grid-3, .grid-6 { grid-template-columns: 1fr; }
            .card { min-height: 200px; }
        }
    </style>
</head>
<body>

    <header>
        <h1 class="main-title">jakob<br>burger</h1>
        
        <input type="checkbox" id="theme-toggle" class="switch-checkbox" onchange="toggleTheme(this)">
        <label for="theme-toggle" class="switch-wrapper">
            <div class="handle">
                <span class="material-symbols-outlined" id="mode-icon">light_mode</span>
            </div>
            <div class="switch-label">
                <span class="switch-text text-dark">DARK MODE</span>
                <span class="switch-text text-light">LIGHT MODE</span>
            </div>
        </label>
    </header>

    <main class="container">
        <h2 class="master-header">Maturazeitung Einsendungen</h2>

        <div class="row-group">
            <div class="sub-section flex-2">
                <h3 class="section-title">Lehrerquotes</h3>
                <div class="card-grid grid-2">
                    <a href="#" class="card card-lehrer"></a>
                    <a href="#" class="card card-lehrer"></a>
                </div>
            </div>
            <div class="sub-section flex-3">
                <h3 class="section-title">Schülerquotes</h3>
                <div class="card-grid grid-3">
                    <a href="#" class="card card-schueler"></a>
                    <a href="#" class="card card-schueler"></a>
                    <a href="#" class="card card-schueler"></a>
                </div>
            </div>
        </div>

        <div class="row-group">
            <div class="sub-section flex-1">
                <h3 class="section-title">Fotos der letzten 4 Jahre</h3>
                <div class="card-grid grid-1">
                    <a href="#" class="card card-4years"></a>
                </div>
            </div>
            <div class="sub-section flex-6">
                <h3 class="section-title">Fotos der Schulreisen</h3>
                <div class="card-grid grid-6">
                    <a href="#" class="card card-reisen"></a>
                    <a href="#" class="card card-reisen"></a>
                    <a href="#" class="card card-reisen"></a>
                    <a href="#" class="card card-reisen"></a>
                    <a href="#" class="card card-reisen"></a>
                    <a href="#" class="card card-reisen"></a>
                </div>
            </div>
        </div>
    </main>

    <script>
        function toggleTheme(input) {
            const body = document.body;
            const icon = document.getElementById('mode-icon');
            
            if (input.checked) {
                body.setAttribute('data-theme', 'dark');
                icon.textContent = 'dark_mode';
                localStorage.setItem('theme', 'dark');
            } else {
                body.removeAttribute('data-theme');
                icon.textContent = 'light_mode';
                localStorage.setItem('theme', 'light');
            }
        }

        // Init Theme
        document.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.getElementById('theme-toggle').checked = true;
                toggleTheme(document.getElementById('theme-toggle'));
            }
        });
    </script>
</body>
</html>
