<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jakob burger // Wrapped</title>
    <link href="https://fonts.googleapis.com/css2?family=Funnel+Display:wght@300..800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Light Mode Colors (Spotify-ish vibe) */
            --bg-color: #f0f0f0;
            --card-bg: #ffffff;
            --text-color: #121212;
            --accent-color: #1DB954; /* Spotify Green */
            --secondary-accent: #ff4d00; /* Vibrant Orange */
            --gradient: linear-gradient(135deg, #1DB954 0%, #191414 100%);
            --card-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        [data-theme="dark"] {
            /* Dark Mode Colors */
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #ffffff;
            --accent-color: #1ed760;
            --card-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        body {
            font-family: 'Funnel Display', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 2rem;
            line-height: 1.2;
        }

        /* --- Header & Title --- */
        header {
            max-width: 1200px;
            margin: 0 auto 4rem auto;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .main-title {
            font-size: clamp(3rem, 10vw, 8rem);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: -2px;
            line-height: 0.85;
        }

        .sub-header {
            font-size: clamp(1.5rem, 4vw, 3rem);
            font-weight: 700;
            margin-bottom: 2rem;
            opacity: 0.9;
            border-bottom: 5px solid var(--accent-color);
            display: inline-block;
        }

        /* --- Theme Toggle --- */
        .toggle-container {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            padding: 10px;
            background: var(--card-bg);
            border-radius: 50px;
            box-shadow: var(--card-shadow);
        }

        #theme-toggle {
            cursor: pointer;
            width: 20px;
            height: 20px;
        }

        /* --- Layout Grid --- */
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        section {
            margin-bottom: 5rem;
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
            letter-spacing: 2px;
            color: var(--accent-color);
        }

        .grid {
            display: grid;
            gap: 1.5rem;
        }

        /* Card Counts Logic */
        .grid-2 { grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); }
        .grid-3 { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
        .grid-1 { grid-template-columns: 1fr; }
        .grid-6 { grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); }

        /* --- Cards --- */
        .card {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 2rem;
            min-height: 250px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            text-decoration: none;
            color: inherit;
            position: relative;
            overflow: hidden;
            box-shadow: var(--card-shadow);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease;
            border: 1px solid rgba(128, 128, 128, 0.1);
        }

        .card:hover {
            transform: scale(1.03) rotate(1deg);
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            background-color: var(--accent-color);
            color: #000;
        }

        /* Graphic Elements for cards */
        .card::before {
            content: "";
            position: absolute;
            top: -50px;
            right: -50px;
            width: 150px;
            height: 150px;
            background: var(--accent-color);
            border-radius: 50%;
            opacity: 0.1;
            transition: 0.3s;
        }

        .card:hover::before {
            background: #fff;
            opacity: 0.2;
            transform: scale(1.5);
        }

        /* Customizing specific groups with colors */
        .group-lehrer .card { border-bottom: 8px solid #ff4d00; }
        .group-schueler .card { border-bottom: 8px solid #9d00ff; }
        .group-4years .card { border-bottom: 8px solid #00d4ff; min-height: 400px; }
        .group-reisen .card { border-bottom: 8px solid var(--accent-color); min-height: 200px; }

        /* Responsive Tweaks */
        @media (max-width: 768px) {
            body { padding: 1rem; }
            header { flex-direction: column; gap: 20px; }
            .grid-6 { grid-template-columns: repeat(2, 1fr); }
            .card { min-height: 180px; }
        }

        @media (max-width: 480px) {
            .grid-6 { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <h1 class="main-title">jakob<br>burger</h1>
        <div class="toggle-container" onclick="toggleTheme()">
            <span style="font-weight: bold; font-size: 0.8rem;">DARK MODE</span>
            <input type="checkbox" id="theme-toggle">
        </div>
    </header>

    <main class="container">
        <h2 class="sub-header">Maturazeitung Einsendungen</h2>

        <section class="group-lehrer">
            <h3 class="section-title">Lehrerquotes</h3>
            <div class="grid grid-2">
                <a href="#" class="card"> </a>
                <a href="#" class="card"> </a>
            </div>
        </section>

        <section class="group-schueler">
            <h3 class="section-title">Schülerquotes</h3>
            <div class="grid grid-3">
                <a href="#" class="card"> </a>
                <a href="#" class="card"> </a>
                <a href="#" class="card"> </a>
            </div>
        </section>

        <section class="group-4years">
            <h3 class="section-title">Fotos der letzten 4 Jahre</h3>
            <div class="grid grid-1">
                <a href="#" class="card"> </a>
            </div>
        </section>

        <section class="group-reisen">
            <h3 class="section-title">Fotos der Schulreisen</h3>
            <div class="grid grid-6">
                <a href="#" class="card"> </a>
                <a href="#" class="card"> </a>
                <a href="#" class="card"> </a>
                <a href="#" class="card"> </a>
                <a href="#" class="card"> </a>
                <a href="#" class="card"> </a>
            </div>
        </section>
    </main>

    <script>
        function toggleTheme() {
            const body = document.body;
            const checkbox = document.getElementById('theme-toggle');
            
            if (body.getAttribute('data-theme') === 'dark') {
                body.removeAttribute('data-theme');
                checkbox.checked = false;
            } else {
                body.setAttribute('data-theme', 'dark');
                checkbox.checked = true;
            }
        }

        // Initialize checkbox state based on system preference (optional)
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            // Uncomment the line below to enable auto-dark mode on load
            // toggleTheme();
        }
    </script>
</body>
</html>
