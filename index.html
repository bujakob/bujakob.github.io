<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jakob burger | portfolio</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    
    <link href="https://fonts.googleapis.com/css2?family=Funnel+Display:wght@300..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    
    <style>
        :root {
            --bg-color: #f0f0f0;
            --card-bg: #ffffff;
            --text-color: #121212;
            --accent-color: #1DB954;
            --switch-bg: #ffffff;
            --handle-light: #A0B3F2;
            --handle-dark: #000000;
            --card-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        [data-theme="dark"] {
            --bg-color: #000;
            --card-bg: #1e1e1e;
            --text-color: #ffffff;
            --accent-color: #1ed760;
            --switch-bg: #ffffff;
            --card-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.3s ease, color 0.3s ease, transform 0.3s ease;
        }

        body {
            font-family: 'Funnel Display', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 2rem;
            overflow-x: hidden;
            position: relative; /* Wichtig für die Positionierung des Bildes */
        }

        /* --- Hero Image Decoration --- */
        .hero-decoration {
            position: absolute;
            top: 0;
            right: 0;
            width: 62.5%; /* Größe anpassen */
            z-index: -1; /* Hinter dem Text */
            opacity: 0.8;
            pointer-events: none; /* Man kann durch das Bild klicken */
        }

        /* Invertiert das Bild im Dark Mode für bessere Sichtbarkeit */
        [data-theme="dark"] .hero-decoration {
            filter: invert(1) brightness(0.8);
        }

        header {
            max-width: 1400px;
            margin: 0 auto 3rem auto;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            margin-top: 3vh;
            gap: 20px;
        }

        .main-title {
            font-size: 5rem;
            font-weight: 800;
            line-height: 0.8;
            letter-spacing: -2px;
            z-index: 1;
        }
        
        /* --- Modern Material Switch --- */
        .switch-wrapper {
            position: relative;
            width: 166px;
            height: 64px;
            background: #ffffff;
            border-radius: 100px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            cursor: pointer;
            display: flex;
            align-items: center;
            padding: 0 8px;
            z-index: 10; /* Über dem Bild */
        }

        .switch-checkbox { display: none; }

        .switch-label {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            position: relative;
            z-index: 1;
            cursor: pointer;
        }

        .switch-text {
            font-weight: 800;
            font-size: 0.8rem;
            color: #000;
            letter-spacing: 1px;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .handle {
            position: absolute;
            height: 52px;
            width: 52px;
            background-color: var(--handle-light);
            border-radius: 50%;
            top: 6px;
            left: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.25s ease, background-color 0.3s;
            z-index: 2;
        }

        .handle .material-symbols-outlined {
            color: white;
            font-size: 28px;
        }

        .switch-checkbox:checked + .switch-wrapper .handle {
            transform: translateX(100px);
            background-color: var(--handle-dark);
        }

        .switch-checkbox:checked + .switch-wrapper .text-light { opacity: 0; }
        .switch-checkbox:not(:checked) + .switch-wrapper .text-dark { opacity: 0; }

        /* --- Layout --- */
        .container { max-width: 1400px; margin: 0 auto; position: relative; z-index: 1; }

        .master-header {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            margin-bottom: 3rem;
            border-bottom: 6px solid var(--accent-color);
            display: inline-block;
        }

        .row-group {
            display: flex;
            gap: 2rem;
            margin-bottom: 4rem;
            align-items: stretch;
        }

        .sub-section { flex: 1; display: flex; flex-direction: column; }

        .section-title {
            font-size: 1.5rem;
            letter-spacing: -0.5px;
            margin-bottom: 1rem;
            color: var(--accent-color);
            font-weight: 600;
        }

        .card-grid {
            display: grid;
            gap: 1rem;
            height: 100%;
        }

        .flex-2 { flex: 3; }
        .flex-3 { flex: 3; }
        .flex-1 { flex: 1; }
        .flex-6 { flex: 7; }

        .grid-2 { grid-template-columns: repeat(3, 1fr); }
        .grid-3 { grid-template-columns: repeat(3, 1fr); }
        .grid-1 { grid-template-columns: 1fr; }
        .grid-6 { grid-template-columns: repeat(7, 1fr); }

        .card {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 1.5rem;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
            font-weight: 600;
            line-height: 1;
            text-decoration: none;
            color: inherit;
            box-shadow: var(--card-shadow);
            border: 1px solid rgba(128,128,128,0.1);
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: scale(1.02) rotate(-1deg);
            background-color: var(--accent-color);
            color: #000;
        }

        .card-lehrer { border-bottom: 8px solid #ff4d00; font-size: 4rem; }
        .card-schueler { border-bottom: 8px solid #9d00ff; font-size: 4rem; }
        .card-beichten { border-bottom: 8px solid #9d00ff; font-size: 1.5rem; }
        .card-4years { border-bottom: 8px solid #00d4ff; font-size: 1.5rem; }
        .card-reisen { border-bottom: 8px solid var(--accent-color); font-size: 1.5rem; }

        @media (max-width: 1100px) {
            .row-group { flex-direction: column; }
            .grid-6 { grid-template-columns: repeat(3, 1fr); }
            .hero-decoration { width: 60%; opacity: 0.4; }
        }

        @media (max-width: 768px) {
            header { justify-content: center; text-align: center; }
            .grid-2, .grid-3, .grid-6 { grid-template-columns: 1fr; }
            .card { min-height: 180px; }
            .hero-decoration { 
                    display: block;    /* Bild wieder einschalten */
                    width: 195%;       /* Etwas größer, damit es den Hintergrund füllt */
                    opacity: 0.2;     /* Sehr dezent, damit man den Namen noch lesen kann */
                    top: -20px;       /* Ein bisschen nach oben schieben */
                    right: -10px;
                }
        }
    </style>
</head>
<body>

    <img src="hero_bg.png" alt="" class="hero-decoration">

    <header>
        <h1 class="main-title">jakob<br>burger</h1>
        
        <input type="checkbox" id="theme-toggle" class="switch-checkbox" onchange="toggleTheme(this)">
        <label for="theme-toggle" class="switch-wrapper">
            <div class="handle">
                <span class="material-symbols-outlined" id="mode-icon">light_mode</span>
            </div>
            <div class="switch-label">
                <span class="switch-text text-dark">DARK MODE</span>
                <span class="switch-text text-light">LIGHT MODE</span>
            </div>
        </label>
    </header>

    <main class="container">
        <h2 class="master-header">Maturazeitung Einsendungen</h2>

        <div class="row-group">
            <div class="sub-section flex-2">
                <h3 class="section-title">Lehrerquotes</h3>
                <div class="card-grid grid-2">
                    <a target="_blank" href="https://docs.google.com/document/d/1hJoDlnyFEvkqJ3OPsh7Fqn4-FMQQfqaEzCJ-l_4KTbM/edit?usp=sharing" class="card card-lehrer">8A</a>
                    <a target="_blank" href="https://docs.google.com/document/d/1WHWDQcgIS_kD_g0HCkaLo0E22u_THdxTf9B9qIHOo7o/edit?usp=sharing" class="card card-lehrer">8B</a>
                    <a target="_blank" href="https://docs.google.com/document/d/1nM0vka7MnTWiFgMdCywJ6gqz8ecH46W41d6-snFcVuw/edit?usp=sharing" class="card card-lehrer">8C</a>
                </div>
            </div>
            <div class="sub-section flex-3">
                <h3 class="section-title">Schülerquotes</h3>
                <div class="card-grid grid-3">
                    <a target="_blank" href="https://docs.google.com/document/d/1w0_E3m1-RG4BH1IqRr8msqShYuqtWYDNBAXB2Po5iX8/edit?usp=sharing" class="card card-schueler">8A</a>
                    <a target="_blank" href="https://docs.google.com/document/d/1lv95f6DdJvcl4x_ZOtJA3MCpHvyLM55dWrinOJC3FTg/edit?usp=sharing" class="card card-schueler">8B</a>
                    <a target="_blank" href="https://docs.google.com/document/d/152G4MGPRgQY0i5yStv22JtAEEBeIqVBXbhRFoQFV6Vc/edit?usp=sharing" class="card card-schueler">8C</a>
                </div>
            </div>
            <div class="sub-section flex-1">
                <h3 class="section-title">Beichten</h3>
                <div class="card-grid grid-1">
                    <a target="_blank" href="https://docs.google.com/document/d/1w0_E3m1-RG4BH1IqRr8msqShYuqtWYDNBAXB2Po5iX8/edit?usp=sharing" class="card card-beichten">ANONYME<br>BEICHTEN</a>
                </div>
            </div>
        </div>

        <div class="row-group">
            <div class="sub-section flex-1">
                <h3 class="section-title">Fotos 4 Jahre</h3>
                <div class="card-grid grid-1">
                    <a target="_blank" href="https://photos.app.goo.gl/5XvQzQ9MipVMoy8PA" class="card card-4years">ALLE<br>VIER<br>JAHRE</a>
                </div>
            </div>
            <div class="sub-section flex-6">
                <h3 class="section-title">Fotos der Schulreisen</h3>
                <div class="card-grid grid-6">
                    <a target="_blank" href="https://photos.app.goo.gl/6TsrjEGUq1KDmtXC8" class="card card-reisen">SOMMER<br>SPORT<br>WOCHE</a>
                    <a target="_blank" href="https://photos.app.goo.gl/fQS5H4G5427ZLoUP7" class="card card-reisen">WALES</a>
                    <a target="_blank" href="https://photos.app.goo.gl/1A2mk4mkJN2kxo6K9" class="card card-reisen">MEERES<br>BIO<br>WOCHE</a>
                    <a target="_blank" href="https://photos.app.goo.gl/6oLHJNuQGHEQGc2W8" class="card card-reisen">ROM</a>
                    <a target="_blank" href="https://photos.app.goo.gl/B1ZhAFfCpT9r6EiY8" class="card card-reisen">BARCE<br>LONA</a>
                    <a target="_blank" href="https://photos.app.goo.gl/iVqePN9TW7C7YCLT9" class="card card-reisen">DUBLIN</a>
                    <a target="_blank" href="https://photos.app.goo.gl/kRbwsxHP2PuDTyxbA" class="card card-reisen">BILBAO</a>
                </div>
            </div>
        </div>
    </main>

    <script>
        function toggleTheme(input) {
            const body = document.body;
            const icon = document.getElementById('mode-icon');
            
            if (input.checked) {
                body.setAttribute('data-theme', 'dark');
                icon.textContent = 'dark_mode';
                localStorage.setItem('theme', 'dark');
            } else {
                body.removeAttribute('data-theme');
                icon.textContent = 'light_mode';
                localStorage.setItem('theme', 'light');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.getElementById('theme-toggle').checked = true;
                toggleTheme(document.getElementById('theme-toggle'));
            }
        });
    </script>
</body>
</html>
